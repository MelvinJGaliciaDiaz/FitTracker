<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="theme-color" content="#0a0a0f"/>
  <title>FitTrack — Reset Password</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body {
      padding-bottom: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .reset-wrap {
      width: 100%;
      max-width: 400px;
      padding: 24px 20px;
      position: relative;
      z-index: 1;
    }
    .reset-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 32px 24px;
      position: relative;
      overflow: hidden;
    }
    .reset-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1.5px;
      background: linear-gradient(90deg, transparent, var(--accent) 50%, transparent);
    }
    .reset-logo {
      font-family: var(--font-disp);
      font-size: 40px;
      letter-spacing: 4px;
      text-align: center;
      margin-bottom: 4px;
    }
    .reset-logo span { color: var(--accent); }
    .reset-title {
      text-align: center;
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 28px;
    }
    .input-wrap {
      position: relative;
      margin-bottom: 12px;
    }
    .input-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 16px;
      pointer-events: none;
    }
    .input-with-icon { padding-left: 42px !important; }
    .password-toggle {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 16px;
      padding: 4px;
    }
    .strength-bar-wrap { margin-top: -4px; margin-bottom: 14px; }
    .strength-bar-track { height: 4px; background: var(--surface2); border-radius: 99px; overflow: hidden; }
    .strength-bar-fill { height: 100%; width: 0%; border-radius: 99px; transition: width 0.3s, background 0.3s; }
    .strength-label { font-size: 11px; color: var(--muted); margin-top: 4px; text-align: right; }
    .error-msg { color: var(--danger); font-size: 13px; min-height: 18px; margin-bottom: 8px; text-align: center; }
    .success-card {
      text-align: center;
      padding: 20px 0;
      display: none;
    }
    .success-icon { font-size: 52px; margin-bottom: 12px; }
    .loading-overlay {
      position: absolute; inset: 0;
      background: rgba(13,13,18,0.8);
      border-radius: 24px;
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 10;
    }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .glow-blob { position: fixed; border-radius: 50%; filter: blur(80px); pointer-events: none; z-index: 0; }
    .glow-1 { width: 280px; height: 280px; background: rgba(232,255,71,0.06); top: -60px; left: -60px; }
    .glow-2 { width: 240px; height: 240px; background: rgba(168,85,247,0.06); bottom: 60px; right: -40px; }
  </style>
</head>
<body>
  <div class="noise"></div>
  <div class="glow-blob glow-1"></div>
  <div class="glow-blob glow-2"></div>

  <div class="reset-wrap">
    <div class="reset-card">
      <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
      </div>

      <div class="reset-logo">FIT<span>TRACK</span></div>
      <div class="reset-title">Set a new password for your account</div>

      <div id="resetFormArea">
        <div class="input-wrap">
          <span class="input-icon">🔒</span>
          <input
            type="password"
            id="newPassword"
            class="input input-with-icon"
            placeholder="New password"
            autocomplete="new-password"
            style="padding-right:46px"
            oninput="checkStrength(this.value)"
          />
          <button class="password-toggle" onclick="togglePw('newPassword', this)" type="button">👁️</button>
        </div>

        <div class="strength-bar-wrap">
          <div class="strength-bar-track">
            <div class="strength-bar-fill" id="strengthFill"></div>
          </div>
          <div class="strength-label" id="strengthLabel"></div>
        </div>

        <div class="input-wrap">
          <span class="input-icon">🔒</span>
          <input
            type="password"
            id="confirmPassword"
            class="input input-with-icon"
            placeholder="Confirm new password"
            autocomplete="new-password"
          />
        </div>

        <div class="error-msg" id="errorMsg"></div>

        <button class="btn btn-primary" id="updateBtn">Update Password</button>
      </div>

      <div class="success-card" id="successCard">
        <div class="success-icon">✅</div>
        <div style="font-family:var(--font-disp);font-size:28px;letter-spacing:2px;color:var(--success);margin-bottom:8px">PASSWORD UPDATED</div>
        <div style="font-size:14px;color:var(--muted);margin-bottom:24px">You're all set. Sign in with your new password.</div>
        <a href="../login.html" class="btn btn-primary" style="display:flex;justify-content:center">Go to Sign In</a>
      </div>
    </div>
  </div>

  <script src="../js/config.js"></script>
  <script>
    function togglePw(id, btn) {
      const el = document.getElementById(id);
      el.type = el.type === 'password' ? 'text' : 'password';
      btn.textContent = el.type === 'password' ? '👁️' : '🙈';
    }

    function checkStrength(val) {
      const fill  = document.getElementById('strengthFill');
      const label = document.getElementById('strengthLabel');
      if (!val) { fill.style.width = '0'; label.textContent = ''; return; }
      let score = 0;
      if (val.length >= 8) score++;
      if (val.length >= 12) score++;
      if (/[A-Z]/.test(val)) score++;
      if (/[0-9]/.test(val)) score++;
      if (/[^A-Za-z0-9]/.test(val)) score++;
      const levels = [
        { w: '20%', color: '#f87171', text: 'Weak' },
        { w: '40%', color: '#fb923c', text: 'Fair' },
        { w: '60%', color: '#facc15', text: 'Good' },
        { w: '80%', color: '#4ade80', text: 'Strong' },
        { w: '100%', color: '#22c55e', text: 'Very strong' },
      ];
      const lvl = levels[Math.min(score, 4)];
      fill.style.width = lvl.w;
      fill.style.background = lvl.color;
      label.textContent = lvl.text;
      label.style.color = lvl.color;
    }

    document.getElementById('updateBtn').addEventListener('click', async () => {
      const pass    = document.getElementById('newPassword').value;
      const confirm = document.getElementById('confirmPassword').value;
      const errEl   = document.getElementById('errorMsg');
      errEl.textContent = '';

      if (!pass || pass.length < 6) { errEl.textContent = 'Password must be at least 6 characters.'; return; }
      if (pass !== confirm)          { errEl.textContent = 'Passwords don\'t match.'; return; }

      document.getElementById('loadingOverlay').style.display = 'flex';
      const { error } = await db.auth.updateUser({ password: pass });
      document.getElementById('loadingOverlay').style.display = 'none';

      if (error) {
        errEl.textContent = error.message;
      } else {
        document.getElementById('resetFormArea').style.display = 'none';
        document.getElementById('successCard').style.display = 'block';
        await db.auth.signOut();
      }
    });
  </script>
</body>
</html>
